<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Bookstore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9B7BA8, #2BA878);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .login-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #2BA878;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #9B7BA8;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E8D9F2;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2BA878;
            box-shadow: 0 0 8px rgba(43, 168, 120, 0.2);
        }

        .form-group input::placeholder {
            color: #ccc;
        }

        .form-group input.error {
            border-color: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.2);
        }

        .form-help-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #2BA878;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #1e8a5f;
            transform: scale(1.02);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #9B7BA8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #2BA878;
            text-decoration: underline;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #E8D9F2;
        }

        .signup-link p {
            color: #888;
            font-size: 14px;
        }

        .signup-link a {
            color: #2BA878;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #1e8a5f;
        }

        .home-link {
            text-align: center;
            margin-top: 15px;
        }

        .home-link a {
            color: #9B7BA8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .home-link a:hover {
            color: #2BA878;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .login-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 BookStore</h1>
            <p>Welcome back! Please log in to your account.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="userId">User ID</label>
                <input 
                    type="text" 
                    id="userId" 
                    name="userId" 
                    placeholder="Enter your user ID (e.g., 123-4567)" 
                    required
                    autocomplete="username"
                >
                <div class="form-help-text">Format: XXX-XXXX (7 digits with dash)</div>
                <div class="error-message" id="userIdError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                    autocomplete="current-password"
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="forgot-password">
            <a href="forgot-credentials.html">Forgot password or User ID?</a>
        </div>

        <div class="signup-link">
            <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>

        <div class="home-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        function validateUserIdFormat(userId) {
            // Pattern: XXX-XXXX (7 digits with dash in the middle)
            const userIdPattern = /^\d{3}-\d{4}$/;
            return userIdPattern.test(userId);
        }

        function clearErrors() {
            const userIdInput = document.getElementById('userId');
            const passwordInput = document.getElementById('password');
            const userIdError = document.getElementById('userIdError');
            const passwordError = document.getElementById('passwordError');

            userIdInput.classList.remove('error');
            passwordInput.classList.remove('error');
            userIdError.classList.remove('show');
            passwordError.classList.remove('show');
            userIdError.textContent = '';
            passwordError.textContent = '';
        }

        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const errorDiv = document.getElementById(errorId);

            input.classList.add('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function handleLogin(event) {
            event.preventDefault();
            
            clearErrors();

            const userIdInput = document.getElementById('userId');
            const passwordInput = document.getElementById('password');
            const userId = userIdInput.value.trim();
            const password = passwordInput.value.trim();

            let hasError = false;

            // Validate User ID format
            if (!userId) {
                showError('userId', 'userIdError', 'Please enter your User ID.');
                hasError = true;
            } else if (!validateUserIdFormat(userId)) {
                showError('userId', 'userIdError', 'User ID format incorrect. Use XXX-XXXX format.');
                hasError = true;
            }

            // Validate password
            if (!password) {
                showError('password', 'passwordError', 'Please enter your password.');
                hasError = true;
            } else if (password.length < 6) {
                showError('password', 'passwordError', 'Password must be at least 6 characters long.');
                hasError = true;
            }

            if (hasError) {
                return;
            }

            // Store login info in localStorage (for demo purposes)
            localStorage.setItem('loggedInUser', userId);
            localStorage.setItem('loginTime', new Date().toISOString());

            // Show success message and redirect
            alert('Login successful! Welcome back, ' + userId + '.');
            window.location.href = 'index.html';
        }

        // Optional: Check if user is already logged in
        window.addEventListener('load', function() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                // Uncomment the line below to auto-redirect logged-in users
                // window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
